name: activeglow_chat
description: ActiveGlow Skincare — Skye AI Chat Interface

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.1

  # UUID generation for session IDs
  uuid: ^4.4.0

  # Local storage (persist session ID across app restarts)
  shared_preferences: ^2.2.3

  # Markdown rendering (for Skye's formatted replies)
  flutter_markdown: ^0.7.3

  # Smooth animations
  flutter_animate: ^4.5.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
